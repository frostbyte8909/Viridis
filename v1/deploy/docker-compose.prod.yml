version: '3.8'

services:
  api:
    image: viridis-api:latest
    ports:
      - '8000:8000'
    env_file:
      - .env.prod
    restart: always
    depends_on:
      - redis
      - postgres
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.prod
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
