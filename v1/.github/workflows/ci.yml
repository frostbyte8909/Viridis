name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      # Real Redis container
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      # Real PostgreSQL container
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: viridis
          POSTGRES_PASSWORD: viridis_test
          POSTGRES_DB: viridis_test
        options: >-
          --health-cmd "pg_isready -U viridis"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      # 1. Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4
      
      # 2. Setup Python
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      # 3. Install Dependencies (Poetry/Pip)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      
      # 4. Code Quality (Ruff & Mypy)
      - name: Lint with Ruff
        run: ruff check .
      
      - name: Type Check with Mypy
        run: mypy app/
      
      # 5. Security Scan (Bandit)
      - name: Security Scan with Bandit
        run: bandit -r app/
      
      # 6. Test Execution (Real Redis + Postgres)
      - name: Run Tests
        env:
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql+asyncpg://viridis:viridis_test@localhost:5432/viridis_test
        run: pytest tests/
