name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - run: pip install ruff mypy bandit
      - run: ruff check v1/app
      - run: mypy v1/app --ignore-missing-imports
      - run: bandit -r v1/app

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: viridis_user
          POSTGRES_PASSWORD: viridis_password
          POSTGRES_DB: viridis_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - run: pip install -r v1/requirements.txt pytest httpx
      - run: cd v1 && pytest tests/

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t viridis-api v1/
      # Real security scan in CI
      - run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      - run: trivy image --exit-code 1 --severity CRITICAL viridis-api

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      # Push to ACR would go here
      - run: echo "az containerapp update --name viridis-api-staging --image viridis-api:latest"
      # Run smoke tests to verify staging
      - run: docker run --rm -i grafana/k6 run - < v1/k6/smoke.js

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - run: echo "az containerapp update --name viridis-api --environment production --image viridis-api:latest"
